  <script>
    // attempt to correctly set the base without knowing where we're installed fully...
    if (document.location.pathname.indexOf('/_sites/') != -1) {
      document.write("<base href='" + document.location.pathname.substring(0, document.location.pathname.indexOf('/', document.location.pathname.indexOf('/_sites/') + 8)) + "/' />");
    }
    else if (document.location.pathname.indexOf('/sites/') != -1) {
      document.write("<base href='" + document.location.pathname.substring(0, document.location.pathname.indexOf('/', document.location.pathname.indexOf('/sites/') + 7)) + "/' />");
    }
    else if (globalThis.location.host.indexOf('github.io') != -1 && globalThis.location.pathname.split('/').length > 1) {
      document.write("<base href='/" + document.location.pathname.split('/')[1] + "/' />");
    }
    else {
      document.write("<base href='/' />");
    }
    var mangedSEO = document.querySelectorAll('[data-managed-seo]');
    for (var i = 0; i < mangedSEO.length; i++) {
      var seoTag = mangedSEO[i];
      seoTag.setAttribute('content', document.location.href);
    }
  </script>
  <script>
    (function() {
      var cdn = "./";
      try {
        var xhr = new XMLHttpRequest();
        xhr.open('HEAD', './build/es6/node_modules/@haxtheweb/wc-autoload/wc-autoload.js', false);
        xhr.send();
        if (xhr.status >= 400) {
          cdn = "https://cdn.hax.cloud/cdn/";
        }
      } catch (e) {}
      globalThis.__appCDN = cdn;
      if (cdn !== "./") {
        var cdns = [
          'https://cdn.hax.cloud/cdn/',
          'https://cdn.webcomponents.psu.edu/cdn/'
        ];
        var preloads = document.querySelectorAll('link[rel="modulepreload"]');
        for (var i = 0; i < preloads.length; i++) {
          var href = preloads[i].getAttribute('href');
          if (href && href.indexOf('./build/') === 0) {
            preloads[i].setAttribute('href', cdn + href.substring(2));
          }
        }
        var baseCss = document.querySelector('link[rel="preload"][as="style"]');
        if (baseCss && baseCss.getAttribute('href') && baseCss.getAttribute('href').indexOf('./build/') === 0) {
          baseCss.setAttribute('href', cdn + baseCss.getAttribute('href').substring(2));
        }
        var importmap = document.querySelector('script[type="importmap"]');
        if (importmap) {
          try {
            var map = JSON.parse(importmap.textContent);
            if (map.scopes) {
              Object.keys(map.scopes).forEach(function(scope) {
                Object.keys(map.scopes[scope]).forEach(function(key) {
                  var val = map.scopes[scope][key];
                  cdns.forEach(function(oldCdn) {
                    if (val.indexOf(oldCdn) === 0) {
                      map.scopes[scope][key] = cdn + val.substring(oldCdn.length);
                    }
                  });
                });
              });
            }
            importmap.textContent = JSON.stringify(map);
          } catch (e) {}
        }
      }
    })();
  </script>

    }
  </script>

    haxcms-site-builder {

    #loading {
      background-color: #ffffff;
      inset: 0;
      opacity: 1;
      position: fixed;

    #loading.loaded {
      animation: fade-out .1s ease-in-out;
      animation-fill-mode: forwards;
    }
    #loading div.messaging {
      color: rgba(0,0,0, 0.2);
      left: 0px;
      position: absolute;
      right: 0px;
      text-align: center;
      top: 25vh;
    }
    #loading div.messaging h1 {
      font-family: Helvetica, "Trebuchet MS", Verdana, sans-serif !important;
      line-height: 2;
      font-size: 18px !important;
      margin: 0;
      padding: 0;
    }

    .progress-line,
    .progress-line:before {
      height: 8px;
      width: 100%;
      margin: auto;
    }
    .progress-line {
      background-color: rgba(0,0,0, 0.1);
      display: -webkit-flex;
      display: flex;
      width: 50vw;
    }
    .progress-line:before {
      background-color: #FF2222;
      content: '';
      animation: running-progress 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes running-progress {
      0% {
        margin-left: 0px;
        margin-right: 100%;
      }
      50% {
        margin-left: 25%;
        margin-right: 0%;
      }
      100% {
        margin-left: 100%;
        margin-right: 0;
      }
    }
    @keyframes fade-out {
      0% {
        opacity: 1;
      }
      99% {
        opacity: 0;
      }
      100% {
        opacity: 0;
      }
    }
    @media (prefers-color-scheme: dark) {
      #loading {
        background-color: #333333;
      }
      #loading div.messaging {
        color: rgba(255,255,255, 0.2);
      }
    }
  </style>
  <script id="loadingscript">
    globalThis.dataLayer = globalThis.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    (function () {
      var loadingDismissed = false;
      var analyticsLoaded = false;
      function loadAnalyticsFromManifest() {
        if (analyticsLoaded) {
          return;
        }
        analyticsLoaded = true;
        var script = document.createElement('script');
        script.async = true;
        document.body.appendChild(script);
        if (
          globalThis.HAXCMS &&
          globalThis.HAXCMS.requestAvailability &&
          globalThis.HAXCMS.requestAvailability().store.getManifest()
        ) {
          var gaid =
            globalThis.HAXCMS.requestAvailability().store.getManifest()
              .metadata.site.settings.gaID || null;
          if (gaid) {
            gtag('config', gaid);
            script.src =
              'https://www.googletagmanager.com/gtag/js?id=' + gaid;
          }
        }
      }
      function hideLoading() {
        if (loadingDismissed) {
          return;
        }
        loadingDismissed = true;
        var loadingEl = document.querySelector('#loading');
        if (!loadingEl) {
          return;
        }
        globalThis.requestAnimationFrame(function () {
          globalThis.requestAnimationFrame(function () {
            loadingEl.classList.add('loaded');
            loadingEl.setAttribute('aria-busy', 'false');
            setTimeout(function () {
              loadingEl.setAttribute('hidden', 'hidden');
            }, 120);
          });
        });
      }
      globalThis.addEventListener(
        'json-outline-schema-active-body-changed',
        function () {
          hideLoading();
        },
        { once: true }
      );
      globalThis.addEventListener(
        'haxcms-ready',
        function () {
          setTimeout(function () {
            loadAnalyticsFromManifest();
          }, 150);
          setTimeout(function () {
            hideLoading();
          }, 2500);
        },
        { once: true }
      );
    })();
