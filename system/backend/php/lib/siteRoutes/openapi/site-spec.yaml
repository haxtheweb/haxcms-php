      schema:
        type: string
        example: /x/api/v1/items.json
    AlternateLink:
      description: Alternate representation links
      schema:
        type: string
        example: </x/api/v1/items.yaml>; rel="alternate"; type="application/yaml"
  parameters:
    IdOrSlug:
      name: idOrSlug
      in: path
      required: true
      schema:
        type: string
    SiteExportFormat:
      name: format
      in: path
      required: true
      schema:
        type: string
        enum:
          - zip
          - markdown
          - pdf
          - docx
          - epub
          - skeleton
    ItemExportFormat:
      name: format
      in: path
      required: true
      schema:
        type: string
        enum:
          - pdf
          - docx
    WebcomponentName:
      name: webcomponentName
      in: path
      required: true
      schema:
        type: string
    RegionName:
      name: regionName
      in: path
      required: true
      schema:
        type: string
    ThemeName:
      name: themeName
      in: path
      required: true
      schema:
        type: string
    ReportName:
      name: report
      in: path
      required: true
      schema:
        type: string
    ViewId:
      name: viewId
      in: path
      required: true
      schema:
        type: string
    RequiredSearchQuery:
      name: q
      in: query
      required: true
      schema:
        type: string
        maxLength: 256
    OptionalSearchQuery:
      name: q
      in: query
      required: false
      schema:
        type: string
        maxLength: 256
    FilterParent:
      name: filter.parent
      in: query
      required: false
      schema:
        type: string
    FilterAncestor:
      name: filter.ancestor
      in: query
      required: false
      schema:
        type: string
