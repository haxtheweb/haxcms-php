openapi: 3.0.3
info:
  title: HAXcms Site API
  description: Read-only site API for discovery, metadata, and content/query surfaces.
  version: 0.0.0
servers:
  - url: /
    description: Site base path
tags:
  - name: discovery
  - name: site
  - name: entities
  - name: schemas
  - name: items
  - name: content
  - name: files
  - name: tags
  - name: search
  - name: custom-elements
  - name: blocks
  - name: regions
  - name: themes
  - name: reports
  - name: analytics
  - name: views
paths:
  /x/api:
    get:
      tags:
        - discovery
      operationId: getSiteApiDiscovery
      summary: Get API capabilities and discovery links
      responses:
        "200":
          description: API discovery payload
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ApiCapabilities"
  /x/api/openapi:
    get:
      tags:
        - discovery
      operationId: getSiteOpenApi
      summary: Get OpenAPI document (JSON by default)
      parameters:
        - $ref: "#/components/parameters/Format"
      responses:
        "200":
          description: OpenAPI document
          content:
            application/json:
              schema:
                type: object
            application/yaml:
              schema:
                type: string
  /x/api/openapi.json:
    get:
      tags:
        - discovery
      operationId: getSiteOpenApiJson
      summary: Get OpenAPI document in JSON
      responses:
        "200":
          description: OpenAPI JSON document
          content:
            application/json:
              schema:
                type: object
  /x/api/openapi.yaml:
    get:
      tags:
        - discovery
      operationId: getSiteOpenApiYaml
      summary: Get OpenAPI document in YAML
      responses:
        "200":
          description: OpenAPI YAML document
          content:
            application/yaml:
              schema:
                type: string
            text/yaml:
              schema:
                type: string
  /.well-known/api-catalog:
    get:
      tags:
        - discovery
      operationId: getApiCatalog
      summary: Get API catalog linkset
      responses:
        "200":
          description: Linkset describing discoverable APIs
          content:
            application/linkset+json:
              schema:
                $ref: "#/components/schemas/ApiCatalogLinkset"
  /x/api/v1/site:
    get:
      tags:
        - site
      operationId: getSiteSummary
      summary: Get site-level metadata and counts
      responses:
        "200":
          description: Site summary
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SiteSummary"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/items/{idOrSlug}/export/{format}:
    get:
      tags:
        - items
      operationId: downloadItemExport
      summary: Download an item export file (PDF or DOCX)
      parameters:
        - $ref: "#/components/parameters/IdOrSlug"
        - $ref: "#/components/parameters/ItemExportFormat"
      responses:
        "200":
          description: Item export download
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.wordprocessingml.document:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/entities:
    get:
      tags:
        - entities
      operationId: listEntityDescriptors
      summary: List entity descriptors for the site API
      responses:
        "200":
          description: Entity descriptor collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/EntityCollection"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/schemas:
    get:
      tags:
        - schemas
      operationId: listSchemas
      summary: List schema descriptors and JSON schema fragments
      parameters:
        - $ref: "#/components/parameters/FilterKind"
        - $ref: "#/components/parameters/FilterWebcomponentName"
      responses:
        "200":
          description: Schema descriptor collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SchemaCollection"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/items:
    get:
      tags:
        - items
      operationId: listItems
      summary: List outline items
      parameters:
        - $ref: "#/components/parameters/FilterParent"
        - $ref: "#/components/parameters/FilterAncestor"
        - $ref: "#/components/parameters/FilterDepth"
        - $ref: "#/components/parameters/FilterTags"
        - $ref: "#/components/parameters/FilterPublished"
        - $ref: "#/components/parameters/FilterPageType"
        - $ref: "#/components/parameters/FilterRegion"
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageOffset"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Fields"
        - $ref: "#/components/parameters/Include"
        - $ref: "#/components/parameters/Format"
      responses:
        "200":
          description: Item collection
          headers:
            Vary:
              $ref: "#/components/headers/VaryAccept"
            Content-Location:
              $ref: "#/components/headers/ContentLocation"
            Link:
              $ref: "#/components/headers/AlternateLink"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ItemCollection"
            text/markdown:
              schema:
                type: string
            application/yaml:
              schema:
                type: string
            application/xml:
              schema:
                type: string
            text/html:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/site/export/{format}:
    get:
      tags:
        - site
      operationId: getSiteExport
      summary: Download a site export file (PDF or DOCX) or get descriptor metadata
      parameters:
        - $ref: "#/components/parameters/SiteExportFormat"
      responses:
        "200":
          description: Site export download or descriptor metadata
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        additionalProperties: true
            application/pdf:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.wordprocessingml.document:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/items/{idOrSlug}:
    get:
      tags:
        - items
      operationId: getItemByIdOrSlug
      summary: Get an item by id or slug
      parameters:
        - $ref: "#/components/parameters/IdOrSlug"
        - $ref: "#/components/parameters/Fields"
        - $ref: "#/components/parameters/Include"
        - $ref: "#/components/parameters/Format"
      responses:
        "200":
          description: Item detail
          headers:
            Vary:
              $ref: "#/components/headers/VaryAccept"
            Content-Location:
              $ref: "#/components/headers/ContentLocation"
            Link:
              $ref: "#/components/headers/AlternateLink"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ItemRecord"
            text/markdown:
              schema:
                type: string
            application/yaml:
              schema:
                type: string
            application/xml:
              schema:
                type: string
            text/html:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/content:
    get:
      tags:
        - content
      operationId: listContent
      summary: List content records
      parameters:
        - $ref: "#/components/parameters/FilterParent"
        - $ref: "#/components/parameters/FilterAncestor"
        - $ref: "#/components/parameters/FilterDepth"
        - $ref: "#/components/parameters/FilterTags"
        - $ref: "#/components/parameters/FilterPublished"
        - $ref: "#/components/parameters/FilterPageType"
        - $ref: "#/components/parameters/FilterRegion"
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageOffset"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Fields"
        - $ref: "#/components/parameters/Format"
        - $ref: "#/components/parameters/Mode"
      responses:
        "200":
          description: Content collection
          headers:
            Vary:
              $ref: "#/components/headers/VaryAccept"
            Content-Location:
              $ref: "#/components/headers/ContentLocation"
            Link:
              $ref: "#/components/headers/AlternateLink"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ContentCollection"
            text/markdown:
              schema:
                type: string
            application/yaml:
              schema:
                type: string
            application/xml:
              schema:
                type: string
            text/html:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/content/{idOrSlug}:
    get:
      tags:
        - content
      operationId: getContentByIdOrSlug
      summary: Get content for an item by id or slug
      parameters:
        - $ref: "#/components/parameters/IdOrSlug"
        - $ref: "#/components/parameters/Fields"
        - $ref: "#/components/parameters/Format"
        - $ref: "#/components/parameters/Mode"
      responses:
        "200":
          description: Content detail
          headers:
            Vary:
              $ref: "#/components/headers/VaryAccept"
            Content-Location:
              $ref: "#/components/headers/ContentLocation"
            Link:
              $ref: "#/components/headers/AlternateLink"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ContentRecord"
            text/markdown:
              schema:
                type: string
            application/yaml:
              schema:
                type: string
            application/xml:
              schema:
                type: string
            text/html:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/files:
    get:
      tags:
        - files
      operationId: listFiles
      summary: List site files and metadata
      parameters:
        - $ref: "#/components/parameters/FilterType"
        - $ref: "#/components/parameters/FilterExtension"
        - $ref: "#/components/parameters/FilterStartsWith"
        - $ref: "#/components/parameters/FilterNameContains"
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageOffset"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Fields"
        - $ref: "#/components/parameters/Format"
      responses:
        "200":
          description: File collection
          headers:
            Vary:
              $ref: "#/components/headers/VaryAccept"
            Content-Location:
              $ref: "#/components/headers/ContentLocation"
            Link:
              $ref: "#/components/headers/AlternateLink"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/FileCollection"
            text/markdown:
              schema:
                type: string
            application/yaml:
              schema:
                type: string
            application/xml:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/tags:
    get:
      tags:
        - tags
      operationId: listTags
      summary: List tags and frequencies
      parameters:
        - $ref: "#/components/parameters/FilterTags"
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageOffset"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Fields"
        - $ref: "#/components/parameters/Include"
      responses:
        "200":
          description: Tag collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TagCollection"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/search:
    get:
      tags:
        - search
      operationId: searchContent
      summary: Search item metadata and content
      parameters:
        - $ref: "#/components/parameters/RequiredSearchQuery"
        - $ref: "#/components/parameters/FilterParent"
        - $ref: "#/components/parameters/FilterAncestor"
        - $ref: "#/components/parameters/FilterDepth"
        - $ref: "#/components/parameters/FilterTags"
        - $ref: "#/components/parameters/FilterPublished"
        - $ref: "#/components/parameters/FilterPageType"
        - $ref: "#/components/parameters/FilterRegion"
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageOffset"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Fields"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SearchCollection"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/custom-elements:
    get:
      tags:
        - custom-elements
      operationId: listCustomElements
      summary: List custom element descriptors from registry
      parameters:
        - $ref: "#/components/parameters/FilterTag"
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageOffset"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Fields"
        - $ref: "#/components/parameters/Include"
      responses:
        "200":
          description: Custom element collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CustomElementCollection"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/custom-elements/{webcomponentName}:
    get:
      tags:
        - custom-elements
      operationId: getCustomElementByName
      summary: Get one custom element descriptor
      parameters:
        - $ref: "#/components/parameters/WebcomponentName"
        - $ref: "#/components/parameters/Fields"
        - $ref: "#/components/parameters/Include"
      responses:
        "200":
          description: Custom element detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CustomElementRecord"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/blocks:
    get:
      tags:
        - blocks
      operationId: listBlocks
      summary: List block records and usage counts
      parameters:
        - $ref: "#/components/parameters/FilterTag"
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageOffset"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Fields"
        - $ref: "#/components/parameters/Include"
      responses:
        "200":
          description: Block collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/BlockCollection"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/blocks/{webcomponentName}:
    get:
      tags:
        - blocks
      operationId: getBlockByName
      summary: Get one block record by custom element name
      parameters:
        - $ref: "#/components/parameters/WebcomponentName"
        - $ref: "#/components/parameters/Fields"
        - $ref: "#/components/parameters/Include"
      responses:
        "200":
          description: Block detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/BlockRecord"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/regions:
    get:
      tags:
        - regions
      operationId: listRegions
      summary: List regions and item counts
      parameters:
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageOffset"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Fields"
      responses:
        "200":
          description: Region collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RegionCollection"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/regions/{regionName}:
    get:
      tags:
        - regions
      operationId: getRegionByName
      summary: Get one region and member item records
      parameters:
        - $ref: "#/components/parameters/RegionName"
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageOffset"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Fields"
      responses:
        "200":
          description: Region detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RegionDetail"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/themes:
    get:
      tags:
        - themes
      operationId: listThemes
      summary: List available themes
      parameters:
        - $ref: "#/components/parameters/IncludeDisabled"
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageOffset"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Fields"
      responses:
        "200":
          description: Theme collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ThemeCollection"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/themes/active:
    get:
      tags:
        - themes
      operationId: getActiveTheme
      summary: Get active theme
      parameters:
        - $ref: "#/components/parameters/Fields"
      responses:
        "200":
          description: Active theme
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ThemeRecord"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/themes/{themeName}:
    get:
      tags:
        - themes
      operationId: getThemeByName
      summary: Get one theme by machine name
      parameters:
        - $ref: "#/components/parameters/ThemeName"
        - $ref: "#/components/parameters/Fields"
        - $ref: "#/components/parameters/IncludeDisabled"
      responses:
        "200":
          description: Theme detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ThemeRecord"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/reports:
    get:
      tags:
        - reports
      operationId: listReports
      summary: List report descriptors
      responses:
        "200":
          description: Report descriptor collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ReportCollection"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/reports/{report}:
    get:
      tags:
        - reports
      operationId: getReportByName
      summary: Get one report payload
      parameters:
        - $ref: "#/components/parameters/ReportName"
        - $ref: "#/components/parameters/FilterAncestor"
        - $ref: "#/components/parameters/FilterParent"
        - $ref: "#/components/parameters/Fields"
        - $ref: "#/components/parameters/Format"
      responses:
        "200":
          description: Report detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ReportRecord"
            text/markdown:
              schema:
                type: string
            application/yaml:
              schema:
                type: string
            application/xml:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/analytics:
    get:
      tags:
        - analytics
      operationId: getAnalyticsCapabilities
      summary: Get analytics capability metadata
      responses:
        "200":
          description: Analytics capability record
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AnalyticsRecord"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/views:
    get:
      tags:
        - views
      operationId: listViews
      summary: List saved views/displays
      parameters:
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageOffset"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Fields"
      responses:
        "200":
          description: View collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ViewCollection"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/views/{viewId}:
    get:
      tags:
        - views
      operationId: getViewById
      summary: Get one view descriptor
      parameters:
        - $ref: "#/components/parameters/ViewId"
        - $ref: "#/components/parameters/Fields"
      responses:
        "200":
          description: View detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ViewRecord"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/views/{viewId}/results:
    get:
      tags:
        - views
      operationId: getViewResults
      summary: Resolve and return results for a view
      parameters:
        - $ref: "#/components/parameters/ViewId"
        - $ref: "#/components/parameters/OptionalSearchQuery"
        - $ref: "#/components/parameters/FilterParent"
        - $ref: "#/components/parameters/FilterAncestor"
        - $ref: "#/components/parameters/FilterDepth"
        - $ref: "#/components/parameters/FilterTags"
        - $ref: "#/components/parameters/FilterPublished"
        - $ref: "#/components/parameters/FilterPageType"
        - $ref: "#/components/parameters/FilterRegion"
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageOffset"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Fields"
        - $ref: "#/components/parameters/Format"
      responses:
        "200":
          description: View results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ViewResults"
            text/markdown:
              schema:
                type: string
