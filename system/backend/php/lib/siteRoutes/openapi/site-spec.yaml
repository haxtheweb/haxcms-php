openapi: 3.0.3
info:
  title: HAXcms Site API
  description: Read-only site API for discovery, metadata, and content/query surfaces.
  version: 1.0.0
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: /
    description: Site base path
tags:
  - name: discovery
    description: API discovery and OpenAPI document endpoints.
  - name: site
    description: Site-level metadata and configuration operations.
  - name: entities
    description: Entity catalog and descriptor endpoints.
  - name: schemas
    description: Schema descriptor and JSON schema endpoints.
  - name: items
    description: Outline item records, revisions, and export endpoints.
  - name: content
    description: Content retrieval and content mutation endpoints.
  - name: files
    description: File listing, upload, retrieval, and management endpoints.
  - name: tags
    description: Tag listing and tag frequency endpoints.
  - name: search
    description: Full-text and metadata search endpoints.
  - name: custom-elements
    description: Custom element registry and descriptor endpoints.
  - name: blocks
    description: Block catalog, usage analytics, and block descriptor endpoints.
  - name: regions
    description: Region listing and region member endpoints.
  - name: themes
    description: Theme listing and active theme endpoints.
  - name: reports
    description: Report descriptor and report payload endpoints.
  - name: analytics
    description: Analytics capability and integration metadata endpoints.
  - name: views
    description: Saved view definitions and resolved results endpoints.
  - name: integrations
    description: Third-party integration and provider broker endpoints.
security: []
paths:
  /x/api:
    get:
      tags:
        - discovery
      operationId: getSiteApiDiscovery
      summary: Get API capabilities and discovery links
      responses:
        "200":
          description: API discovery payload
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ApiCapabilities"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/openapi:
    get:
      tags:
        - discovery
      operationId: getSiteOpenApi
      summary: Get OpenAPI document (JSON by default)
      parameters:
        - $ref: "#/components/parameters/Format"
      responses:
        "200":
          description: OpenAPI document
          content:
            application/json:
              schema:
                type: object
            application/yaml:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/openapi.json:
    get:
      tags:
        - discovery
      operationId: getSiteOpenApiJson
      summary: Get OpenAPI document in JSON
      responses:
        "200":
          description: OpenAPI JSON document
          content:
            application/json:
              schema:
                type: object
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/openapi.yaml:
    get:
      tags:
        - discovery
      operationId: getSiteOpenApiYaml
      summary: Get OpenAPI document in YAML
      responses:
        "200":
          description: OpenAPI YAML document
          content:
            application/yaml:
              schema:
                type: string
            text/yaml:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
  /.well-known/api-catalog:
    get:
      tags:
        - discovery
      operationId: getApiCatalog
      summary: Get API catalog linkset
      responses:
        "200":
          description: Linkset describing discoverable APIs
          content:
            application/linkset+json:
              schema:
                $ref: "#/components/schemas/ApiCatalogLinkset"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/site:
    get:
      tags:
        - site
      operationId: getSiteSummary
      summary: Get site-level metadata and counts
      responses:
        "200":
          description: Site summary
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SiteSummary"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - site
      operationId: updateSiteSummary
      summary: Update site summary and manifest-level metadata
      security:
        - bearerAuth: []
          siteTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Site summary update result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/site/updateAlternativeFormats:
    post:
      tags:
        - site
      operationId: updateSiteAlternativeFormats
      summary: Regenerate alternative output formats for the current site
      security:
        - bearerAuth: []
          siteTokenHeader: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              properties:
                format:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Alternative format generation result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          updated:
                            type: boolean
                          site:
                            type: object
                            properties:
                              name:
                                type: string
                          format:
                            type: string
                            nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/site/appearance:
    patch:
      tags:
        - site
      operationId: updateSiteAppearance
      summary: Update site appearance settings
      security:
        - bearerAuth: []
          siteTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Site appearance update result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/site/platform:
    patch:
      tags:
        - site
      operationId: updateSitePlatform
      summary: Update site platform feature settings
      security:
        - bearerAuth: []
          siteTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Site platform update result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/site/blocks:
    patch:
      tags:
        - site
      operationId: updateSiteAllowedBlocks
      summary: Update site allowed blocks settings
      security:
        - bearerAuth: []
          siteTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Site allowed blocks update result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/site/editor:
    patch:
      tags:
        - site
      operationId: updateSiteEditorSettings
      summary: Update site editor settings
      security:
        - bearerAuth: []
          siteTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Site editor settings update result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/site/seo:
    patch:
      tags:
        - site
      operationId: updateSiteSeo
      summary: Update site SEO and author settings
      security:
        - bearerAuth: []
          siteTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Site SEO update result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/site/outline:
    patch:
      tags:
        - site
      operationId: updateSiteOutline
      summary: Update site outline structure as a single atomic operation
      security:
        - bearerAuth: []
          siteTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - items
              properties:
                items:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
      responses:
        "200":
          description: Site outline update result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/items/{idOrSlug}/export/{format}:
    get:
      tags:
        - items
      operationId: downloadItemExport
      summary: Download an item export file (PDF or DOCX)
      parameters:
        - $ref: "#/components/parameters/IdOrSlug"
        - $ref: "#/components/parameters/ItemExportFormat"
      responses:
        "200":
          description: Item export download
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.wordprocessingml.document:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/entities:
    get:
      tags:
        - entities
      operationId: listEntityDescriptors
      summary: List entity descriptors for the site API
      responses:
        "200":
          description: Entity descriptor collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/EntityCollection"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/schemas:
    get:
      tags:
        - schemas
      operationId: listSchemas
      summary: List schema descriptors and JSON schema fragments
      parameters:
        - $ref: "#/components/parameters/FilterKind"
        - $ref: "#/components/parameters/FilterWebcomponentName"
      responses:
        "200":
          description: Schema descriptor collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SchemaCollection"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/items:
    get:
      tags:
        - items
      operationId: listItems
      summary: List outline items
      description: Anonymous requests only return published items that are not hidden from navigation.
      security: []
      parameters:
        - $ref: "#/components/parameters/FilterParent"
        - $ref: "#/components/parameters/FilterAncestor"
        - $ref: "#/components/parameters/FilterDepth"
        - $ref: "#/components/parameters/FilterTags"
        - $ref: "#/components/parameters/FilterPublished"
        - $ref: "#/components/parameters/FilterPageType"
        - $ref: "#/components/parameters/FilterRegion"
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageOffset"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Fields"
        - $ref: "#/components/parameters/Include"
        - $ref: "#/components/parameters/Format"
      responses:
        "200":
          description: Item collection
          headers:
            Vary:
              $ref: "#/components/headers/VaryAccept"
            Content-Location:
              $ref: "#/components/headers/ContentLocation"
            Link:
              $ref: "#/components/headers/AlternateLink"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ItemCollection"
            text/markdown:
              schema:
                type: string
            application/yaml:
              schema:
                type: string
            application/xml:
              schema:
                type: string
            text/html:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - items
      operationId: createItem
      summary: Create a new item in the outline
      security:
        - bearerAuth: []
          siteTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Item creation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/site/export/{format}:
    get:
      tags:
        - site
      operationId: getSiteExport
      summary: Download a site export file (PDF or DOCX) or get descriptor metadata
      parameters:
        - $ref: "#/components/parameters/SiteExportFormat"
      responses:
        "200":
          description: Site export download or descriptor metadata
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        additionalProperties: true
            application/pdf:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.wordprocessingml.document:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/items/{idOrSlug}:
    get:
      tags:
        - items
      operationId: getItemByIdOrSlug
      summary: Get an item by id or slug
      description: Anonymous requests only return items that are published and not hidden from navigation.
      security: []
      parameters:
        - $ref: "#/components/parameters/IdOrSlug"
        - $ref: "#/components/parameters/Fields"
        - $ref: "#/components/parameters/Include"
        - $ref: "#/components/parameters/Format"
      responses:
        "200":
          description: Item detail
          headers:
            Vary:
              $ref: "#/components/headers/VaryAccept"
            Content-Location:
              $ref: "#/components/headers/ContentLocation"
            Link:
              $ref: "#/components/headers/AlternateLink"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ItemRecord"
            text/markdown:
              schema:
                type: string
            application/yaml:
              schema:
                type: string
            application/xml:
              schema:
                type: string
            text/html:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - items
      operationId: updateItem
      summary: Update an item using outline and page detail operations
      security:
        - bearerAuth: []
          siteTokenHeader: []
      parameters:
        - $ref: "#/components/parameters/IdOrSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - operation
              properties:
                operation:
                  type: string
                  enum:
                    - moveUp
                    - moveDown
                    - indent
                    - outdent
                    - setParent
                    - setTitle
                    - setDescription
                    - setTags
                    - setIcon
                    - setMedia
                    - setImage
                    - setRelatedItems
                    - setLocked
                    - setPublished
                    - setHideInMenu
                    - setSlug
                parent:
                  type: string
                  nullable: true
                order:
                  type: integer
                title:
                  type: string
                description:
                  type: string
                tags:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
                icon:
                  type: string
                media:
                  type: string
                image:
                  type: string
                relatedItems:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
                locked:
                  type: boolean
                published:
                  type: boolean
                hideInMenu:
                  type: boolean
                slug:
                  type: string
      responses:
        "200":
          description: Item update result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ItemRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - items
      operationId: deleteItem
      summary: Delete an item by id or slug
      security:
        - bearerAuth: []
          siteTokenHeader: []
      parameters:
        - $ref: "#/components/parameters/IdOrSlug"
      responses:
        "200":
          description: Item deletion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/items/{idOrSlug}/revisions:
    get:
      tags:
        - items
      operationId: listItemRevisions
      summary: List git-backed revision history for one item
      security:
        - bearerAuth: []
          siteTokenHeader: []
      parameters:
        - $ref: "#/components/parameters/IdOrSlug"
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageOffset"
      responses:
        "200":
          description: Revision collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RevisionCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/items/{idOrSlug}/revisions/{revisionId}:
    get:
      tags:
        - items
      operationId: getItemRevisionById
      summary: Get one item revision payload by git hash
      security:
        - bearerAuth: []
          siteTokenHeader: []
      parameters:
        - $ref: "#/components/parameters/IdOrSlug"
        - $ref: "#/components/parameters/RevisionId"
      responses:
        "200":
          description: Revision detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RevisionDetailRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/items/{idOrSlug}/revisions/{revisionId}/restore:
    post:
      tags:
        - items
      operationId: restoreItemRevision
      summary: Restore one item revision as a new commit
      security:
        - bearerAuth: []
          siteTokenHeader: []
      parameters:
        - $ref: "#/components/parameters/IdOrSlug"
        - $ref: "#/components/parameters/RevisionId"
      responses:
        "200":
          description: Revision restore result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RevisionRestoreRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /x/api/v1/content:
    get:
      tags:
        - content
      operationId: listContent
      summary: List content records
      description: Anonymous requests only return content for published items that are not hidden from navigation.
      security: []
      parameters:
        - $ref: "#/components/parameters/FilterParent"
        - $ref: "#/components/parameters/FilterAncestor"
        - $ref: "#/components/parameters/FilterDepth"
        - $ref: "#/components/parameters/FilterTags"
        - $ref: "#/components/parameters/FilterPublished"
        - $ref: "#/components/parameters/FilterPageType"
        - $ref: "#/components/parameters/FilterRegion"
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageOffset"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Fields"
        - $ref: "#/components/parameters/Format"
        - $ref: "#/components/parameters/Mode"
      responses:
        "200":
          description: Content collection
          headers:
            Vary:
              $ref: "#/components/headers/VaryAccept"
            Content-Location:
              $ref: "#/components/headers/ContentLocation"
            Link:
              $ref: "#/components/headers/AlternateLink"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ContentCollection"
            text/markdown:
              schema:
                type: string
            application/yaml:
              schema:
                type: string
            application/xml:
              schema:
                type: string
            text/html:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - content
      operationId: replaceContent
      summary: Replace text across site content in a single operation
      security:
        - bearerAuth: []
          siteTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - search
                - replace
              properties:
                operation:
                  type: string
                  enum:
                    - replace
                search:
                  type: string
                replace:
                  type: string
                replaceConfirm:
                  type: boolean
                replaceDestroyConfirm:
                  type: boolean
                searchCaseSensitive:
                  type: boolean
      responses:
        "200":
          description: Content replace operation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
