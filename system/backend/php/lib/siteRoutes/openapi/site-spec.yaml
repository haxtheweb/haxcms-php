        type: boolean
    FilterPageType:
      name: filter.pageType
      in: query
      required: false
      schema:
        type: string
    FilterRegion:
      name: filter.region
      in: query
      required: false
      schema:
        type: string
    FilterTag:
      name: filter.tag
      in: query
      required: false
      schema:
        type: string
    FilterType:
      name: filter.type
      in: query
      required: false
      schema:
        type: string
    FilterExtension:
      name: filter.extension
      in: query
      required: false
      schema:
        type: string
    FilterStartsWith:
      name: filter.startsWith
      in: query
      required: false
      schema:
        type: string
    FilterNameContains:
      name: filter.nameContains
      in: query
      required: false
      schema:
        type: string
    FilterKind:
      name: filter.kind
      in: query
      required: false
      schema:
        type: string
    FilterWebcomponentName:
      name: filter.webcomponentName
      in: query
      required: false
      schema:
        type: string
